name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create config.ini from secrets
        run: |
          echo "[database]" > config.ini
          echo "host = \"${{ secrets.DB_HOST }}\"" >> config.ini
          echo "port = \"${{ secrets.DB_PORT }}\"" >> config.ini
          echo "name = \"${{ secrets.DB_NAME }}\"" >> config.ini
          echo "user = \"${{ secrets.DB_USER }}\"" >> config.ini
          echo "pass = \"${{ secrets.DB_PASS }}\"" >> config.ini
          echo "" >> config.ini
          echo "[modules]" >> config.ini
          echo "active_boiler = \"tgm96\"" >> config.ini
          echo "provider = \"random_with_db\"" >> config.ini
          echo "reference = \"static\"" >> config.ini
          echo "calculator = \"simple\"" >> config.ini
          echo "interval = \"10\"" >> config.ini
          echo "" >> config.ini
          echo "[accessUser]" >> config.ini
          echo "login = \"${{ secrets.AUTH_LOGIN }}\"" >> config.ini
          echo "password = \"${{ secrets.AUTH_PASSWORD }}\"" >> config.ini

      - name: Deploy via SSH
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          
          # Копируем config.ini
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" scp -o StrictHostKeyChecking=no -P ${{ secrets.SSH_PORT }} config.ini root@${{ secrets.SERVER_HOST }}:/var/www/boiler-monitor/config.ini
          
          # Деплой через git pull
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no -P ${{ secrets.SSH_PORT }} root@${{ secrets.SERVER_HOST }} "
            cd /var/www/boiler-monitor
            
            # Бекапим данные, если нужно
            if [ -f data/boiler.db ]; then
              cp data/boiler.db /tmp/boiler_backup.db
            fi
            
            # Обновляем код
            git fetch origin
            git reset --hard origin/main
            
            # Создаём папки для БД, если нет
            mkdir -p data
            
            # Права
            chown -R www-data:www-data .
            chmod -R 755 .
            chmod 777 data
            
            # Рестарт сервера
            systemctl reload apache2
          "