name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create config.ini from secrets
        run: |
          cat > config.ini << EOF
          [database]
          host = "${{ secrets.DB_HOST }}"
          port = "${{ secrets.DB_PORT }}"
          name = "${{ secrets.DB_NAME }}"
          user = "${{ secrets.DB_USER }}"
          pass = "${{ secrets.DB_PASS }}"

          [modules]
          active_boiler = "tgm96"
          provider = "random_with_db"
          reference = "database"
          calculator = "simple"
          interval = "10"

          [accessUser]
          login = "${{ secrets.AUTH_LOGIN }}"
          password = "${{ secrets.AUTH_PASSWORD }}"
          EOF

      - name: Copy config.ini to server
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            scp -o StrictHostKeyChecking=no \
            -P "${{ secrets.SSH_PORT }}" \
            config.ini \
            "root@${{ secrets.SERVER_HOST }}:/var/www/boiler-monitor/config.ini"

      - name: Deploy via Git
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no \
            -p "${{ secrets.SSH_PORT }}" \
            "root@${{ secrets.SERVER_HOST }}" \
            "cd /var/www/boiler-monitor && \
             git config --global --add safe.directory /var/www/boiler-monitor && \
             git fetch origin && \
             git reset --hard origin/main && \
             chown -R www-data:www-data . && \
             chmod -R 755 . && \
             systemctl reload apache2"